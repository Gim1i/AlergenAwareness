name: Build and deploy to Itch

on:
  push: # On push to auto build, auto build and push (also activates on direct commit but shouldn't happen)
    branches:
      - Main
  workflow_dispatch:

env:
  PROJECT_NAME: AlergenAwareness

jobs:
  buildAndTestForLinuxBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }} # Linux builds are better for server performance
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        projectPath:
          - ./
        unityVersion:
          - 6000.2.10f1
        targetPlatform:
          - WebGL
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
      # Cache build to speed up future builds
    - uses: actions/cache@v3
      with:
        path: ${{ matrix.projectPath }}/Library
        key: Library-${{ env.PROJECT_NAME }}-${{ matrix.unityVersion }}-${{ matrix.targetPlatform }}
        restore-keys: |
          Library-${{ env.PROJECT_NAME }}-${{ matrix.unityVersion }}-
          Library-${{ env.PROJECT_NAME }}-
          Library-
      # Use GameCI to build the unity project
    - uses: game-ci/unity-builder@v4
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        projectPath: ${{ matrix.projectPath }}
        unityVersion: ${{ matrix.unityVersion }}
        targetPlatform: ${{ matrix.targetPlatform }}
        buildName: ${{ env.PROJECT_NAME }}
        buildsPath: build/${{ matrix.unityVersion }}/${{ matrix.targetPlatform }}
      # Publish to Itch
    - uses: manleydev/butler-publish-itchio-action@v1.0.3
      env:
        BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
        CHANNEL: html5
        ITCH_GAME: ${{ vars.ITCH_GAME }}
        ITCH_USER: ${{ vars.ITCH_USER }}
        PACKAGE: build/${{ matrix.unityVersion }}/${{ matrix.targetPlatform }}
